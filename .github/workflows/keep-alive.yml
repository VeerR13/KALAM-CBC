# Keep Alive — prevents Render free-tier cold starts by pinging the app every 14 minutes.

name: Keep Alive

on:
  schedule:
    # Runs every 14 minutes. Render spins down free services after ~15 min of inactivity.
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Render
        run: curl -f --max-time 30 https://kalam-ac7c.onrender.com || echo "Server unreachable — check Render dashboard"
